                            <div className="p-6">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-bold text-gray-800">{isEditing ? 'Edit Driver' : 'Add New Driver'}</h2>
                                    <button type="button" onClick={onClose} className="text-gray-400 hover:text-gray-600 transition-colors touch-manipulation">
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                        </svg>
                                    </button>
                                </div>
                                <div className="space-y-4">
                                    <div>
                                        <label htmlFor="driverName" className="block text-sm font-medium text-gray-700">Driver Name *</label>
                                        <input 
                                            type="text" 
                                            id="driverName" 
                                            value={name} 
                                            onChange={(e) => setName(e.target.value)} 
                                            className="mt-1 block w-full px-3 py-3 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-lg touch-manipulation" 
                                            required 
                                            autoComplete="name"
                                        />
                                    </div>
                                    <div>
                                        <label htmlFor="phone" className="block text-sm font-medium text-gray-700">Phone Number</label>
                                        <input 
                                            type="tel" 
                                            id="phone" 
                                            value={phone} 
                                            onChange={(e) => setPhone(e.target.value)} 
                                            className="mt-1 block w-full px-3 py-3 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 text-lg touch-manipulation" 
                                            autoComplete="tel"
                                        />
                                    </div>
                                </div>
                            </div>
                            <div className="bg-gray-50 px-6 py-4 rounded-b-2xl flex space-x-3">
                                <button type="button" onClick={onClose} className="w-full bg-gray-200 text-gray-800 font-bold py-3 px-4 rounded-lg hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-400 transition-all duration-200 touch-manipulation">
                                    Cancel
                                </button>
                                <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all duration-200 shadow-md touch-manipulation">
                                    {isEditing ? 'Update' : 'Save'}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        // Main App Component
        function App() {
            const [driverData, setDriverData] = useState(() => {
                // Load from localStorage if available
                const saved = localStorage.getItem('driverData');
                return saved ? JSON.parse(saved) : initialDriverData;
            });
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedDriver, setSelectedDriver] = useState(null);
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [editingDriver, setEditingDriver] = useState(null);

            // Save to localStorage whenever data changes
            useEffect(() => {
                localStorage.setItem('driverData', JSON.stringify(driverData));
            }, [driverData]);

            const filteredDrivers = useMemo(() => {
                if (!searchQuery) return [];
                return driverData.filter(driver =>
                    driver.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    (driver.phone && driver.phone.toLowerCase().includes(searchQuery.toLowerCase()))
                ).sort((a, b) => a.name.localeCompare(b.name));
            }, [searchQuery, driverData]);

            const handleSelectDriver = (driver) => setSelectedDriver(driver);
            const handleCloseDetailModal = () => setSelectedDriver(null);
            
            const handleSaveDriver = (driverToSave) => {
                if (driverToSave.id) {
                    // Update existing driver
                    setDriverData(driverData.map(d => d.id === driverToSave.id ? driverToSave : d));
                } else {
                    // Add new driver
                    const newDriver = { ...driverToSave, id: Date.now() };
                    setDriverData([...driverData, newDriver]);
                }
                setEditingDriver(null);
                setIsFormOpen(false);
            };

            const handleOpenAddForm = () => {
                setEditingDriver(null);
                setIsFormOpen(true);
            };

            const handleOpenEditForm = (driver) => {
                setEditingDriver(driver);
                setIsFormOpen(true);
            };

            const handleDeleteDriver = (driverId) => {
                if (window.confirm("Are you sure you want to delete this driver?")) {
                    setDriverData(driverData.filter(d => d.id !== driverId));
                }
            };

            return (
                <div className="min-h-screen font-sans bg-slate-100">
                    <header className="bg-gradient-to-r from-indigo-500 to-purple-600 text-white shadow-lg sticky top-0 z-10">
                        <div className="max-w-2xl mx-auto p-4">
                            <div className="flex justify-between items-center">
                                <h1 className="text-3xl font-bold">Driver Directory</h1>
                                <button 
                                    onClick={handleOpenAddForm} 
                                    className="bg-white text-indigo-600 font-semibold py-2 px-4 rounded-lg hover:bg-indigo-100 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-indigo-600 focus:ring-white transition-all duration-200 shadow-md flex items-center touch-manipulation"
                                >
                                    <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                                    </svg>
                                    Add New
                                </button>
                            </div>
                            <div className="mt-4 relative">
                                <input
                                    type="text"
                                    value={searchQuery}
                                    onChange={e => setSearchQuery(e.target.value)}
                                    placeholder="Search by name or phone number..."
                                    className="w-full px-4 py-3 text-lg border-2 border-transparent bg-white bg-opacity-20 text-white placeholder-indigo-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-white focus:bg-opacity-30 transition-all touch-manipulation"
                                    autoComplete="off"
                                />
                                <svg className="w-6 h-6 text-indigo-200 absolute top-1/2 right-4 transform -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                </svg>
                            </div>
                        </div>
                    </header>
                    
                    <main className="max-w-2xl mx-auto p-4">
                        {searchQuery && (
                            <div className="bg-white rounded-lg shadow-lg overflow-hidden">
                                {filteredDrivers.length > 0 ? (
                                    <>
                                        <div className="px-4 py-2 bg-gray-50 border-b">
                                            <p className="text-sm text-gray-600">{filteredDrivers.length} driver{filteredDrivers.length !== 1 ? 's' : ''} found</p>
                                        </div>
                                        <ul>
                                            {filteredDrivers.map(driver => 
                                                <DriverListItem 
                                                    key={driver.id} 
                                                    driver={driver} 
                                                    onSelect={handleSelectDriver}
                                                    onEdit={handleOpenEditForm}
                                                    onDelete={handleDeleteDriver}
                                                />
                                            )}
                                        </ul>
                                    </>
                                ) : (
                                    <div className="p-8 text-center text-gray-500">
                                        <svg className="w-12 h-12 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                        </svg>
                                        <p className="font-semibold">No drivers found for "{searchQuery}"</p>
                                        <p className="text-sm mt-1">Try a different search term or check the spelling.</p>
                                    </div>
                                )}
                            </div>
                        )}
                        
                        {!searchQuery && (
                            <div className="p-8 text-center text-gray-500 mt-10">
                                <svg className="w-16 h-16 mx-auto text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                                </svg>
                                <h3 className="mt-4 text-xl font-semibold text-gray-700">Driver Directory</h3>
                                <p className="mt-1 text-gray-500">Search for a driver by name or phone number</p>
                                <p className="text-sm text-gray-400 mt-2">{driverData.length} drivers in directory</p>
                            </div>
                        )}
                    </main>
                    
                    {/* Modals */}
                    <DriverDetailModal driver={selectedDriver} onClose={handleCloseDetailModal} />
                    <DriverFormModal 
                        isOpen={isFormOpen} 
                        onClose={() => setIsFormOpen(false)} 
                        onSave={handleSaveDriver}
                        driver={editingDriver}
                    />
                </div>
            );
        }

        // Initialize React App
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);

        // Service Worker Registration for PWA
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'driver-search-app-v2';
                const urlsToCache = [
                    '/',
                    '/driver-search-app.html',
                    'https://cdn.tailwindcss.com',
                    'https://unpkg.com/react@18/umd/react.production.min.js',
                    'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
                    'https://unpkg.com/@babel/standalone/babel.min.js'
                ];

                self.addEventListener('install', event => {
                    event.waitUntil(
                        caches.open(CACHE_NAME)
                            .then(cache => {
                                console.log('Opened cache');
                                return cache.addAll(urlsToCache);
                            })
                    );
                });

                self.addEventListener('fetch', event => {
                    event.respondWith(
                        caches.match(event.request)
                            .then(response => {
                                // Return cached version or fetch from network
                                return response || fetch(event.request);
                            }
                        )
                    );
                });

                self.addEventListener('activate', event => {
                    event.waitUntil(
                        caches.keys().then(cacheNames => {
                            return Promise.all(
                                cacheNames.map(cacheName => {
                                    if (cacheName !== CACHE_NAME) {
                                        return caches.delete(cacheName);
                                    }
                                })
                            );
                        })
                    );
                });
            `;

            const swBlob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(swBlob);

            window.addEventListener('load', () => {
                navigator.serviceWorker.register(swUrl)
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }

        // PWA Install Prompt
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            deferredPrompt = e;
            console.log('PWA install prompt ready');
        });

        // Add to home screen functionality
        window.addEventListener('appinstalled', (evt) => {
            console.log('Driver Search App was installed');
        });
    </script>
</body>
</html>
